<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feliz Día de la Madre ❤️</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* ESTRELLAS */
    .estrella {
      position: absolute;
      width: 3px;
      height: 3px;
      background: white;
      border-radius: 50%;
      animation: brillo 2s infinite alternate;
    }

    @keyframes brillo {
      from {
        opacity: 0.2;
      }

      to {
        opacity: 1;
      }
    }

    /* TARJETA */
    .card {
      width: 92%;
      max-width: 450px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      border-radius: 30px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
      z-index: 2;
      animation: aparecer 2s ease;
    }

    .card h1 {
      color: white;
      font-size: 42px;
      margin-bottom: 20px;
      text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.4);
    }

    .card p {
      color: white;
      font-size: 21px;
      line-height: 1.8;
      margin-bottom: 30px;
    }

    .btn {
      padding: 15px 30px;
      border: none;
      border-radius: 50px;
      background: #ff1744;
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: 0.4s;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    .btn:hover {
      transform: scale(1.08);
      background: #d50032;
    }

    /* SOBRE */
    .sobre {
      position: fixed;
      width: 300px;
      height: 200px;
      background: #ff4d6d;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      z-index: 1000;
      border-radius: 10px;
      transition: 0.7s;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    .sobre.active {
      transform: translate(-50%, -50%) scale(1);
    }

    .tapa {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #ff758f;
      clip-path: polygon(0 0, 50% 55%, 100% 0);
      transform-origin: top;
      transition: 1s;
      z-index: 2;
    }

    .sobre.abierto .tapa {
      transform: rotateX(180deg);
    }

    /* CARTA */
    .carta {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);

      width: 92%;
      max-width: 700px;

      background: white;

      padding: 30px;

      border-radius: 25px;

      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);

      z-index: 2000;

      transition: 0.7s;

      max-height: 85vh;

      overflow-y: auto;

      -webkit-overflow-scrolling: touch;

      position: fixed;
    }

    .carta::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;

      background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.4),
        transparent
      );

      transform: rotate(25deg);

      animation: brilloCarta 6s linear infinite;
    }

    @keyframes brilloCarta {

      0% {
        transform: translateX(-100%) rotate(25deg);
      }

      100% {
        transform: translateX(100%) rotate(25deg);
      }
    }

    .carta.active {
      transform: translate(-50%, -50%) scale(1);
    }

    .carta h2 {
      text-align: center;
      color: #ff1744;
      margin-bottom: 20px;
      font-size: 36px;
      position: relative;
      z-index: 2;
    }

    .texto {
      font-size: 21px;
      line-height: 2;
      color: #444;
      white-space: pre-line;
      text-align: justify;
      position: relative;
      z-index: 2;

      animation: aparecerTexto 1.5s ease;
    }

    @keyframes aparecerTexto {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .cerrar {
      margin-top: 25px;
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 15px;
      background: #ff1744;
      color: white;
      font-size: 18px;
      cursor: pointer;
      position: relative;
      z-index: 2;
    }

    .cerrar:hover {
      background: #d50032;
    }

    /* OVERLAY */
    .overlay {
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      z-index: 999;
    }

    .overlay.active {
      display: block;
    }

    /* CORAZONES */
    .heart {
      position: absolute;
      animation: flotar 6s linear infinite;
      opacity: 0.8;
    }

    @keyframes flotar {
      0% {
        transform: translateY(100vh) scale(0.5);
        opacity: 0;
      }

      50% {
        opacity: 1;
      }

      100% {
        transform: translateY(-120px) scale(1.3);
        opacity: 0;
      }
    }

    /* ROSAS */
    .petalo {
      position: absolute;
      font-size: 22px;
      animation: caer 8s linear infinite;
    }

    @keyframes caer {
      0% {
        transform: translateY(-100px) rotate(0deg);
      }

      100% {
        transform: translateY(110vh) rotate(360deg);
      }
    }

    @keyframes aparecer {
      from {
        opacity: 0;
        transform: scale(0.7);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    img {
      width: 160px;
      border-radius: 20px;
      display: block;
      margin: 0 auto 20px auto;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
      position: relative;
      z-index: 2;
    }

    @media(max-width:600px){

      .card h1{
        font-size:32px;
      }

      .card p{
        font-size:18px;
      }

      .texto{
        font-size:18px;
      }

      .carta h2{
        font-size:28px;
      }
    }
  </style>
</head>

<body>

  <!-- MÚSICA -->
  <audio id="musica" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8e55b84.mp3?filename=romantic-love-11786.mp3" type="audio/mp3">
  </audio>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay"></div>

  <!-- TARJETA -->
  <div class="card">

    <h1>🌹 Feliz Día Mamá 🌹</h1>

    <p>
      Para la mujer más hermosa,
      fuerte e irremplazable de mi vida ❤️
    </p>

    <button class="btn" onclick="mostrarSobre()">
      Abrir Sorpresa 💌
    </button>

  </div>

  <!-- SOBRE -->
  <div class="sobre" id="sobre">
    <div class="tapa"></div>
  </div>

  <!-- CARTA -->
  <div class="carta" id="carta">

    <img src="https://cdn-icons-png.flaticon.com/512/194/194938.png">

    <h2>💖 Para Mamá 💖</h2>

    <div class="texto" id="texto"></div>

    <button class="cerrar" onclick="cerrarCarta()">
      Cerrar Carta ❌
    </button>

  </div>

  <script>

    const mensaje = `

Mamá ❤️

Hoy quiero decirte cuánto te amo y lo importante que eres para mí.

Gracias por cada abrazo cuando más lo necesitaba,
por cada consejo, por cada sonrisa y por nunca dejarme solo 🌹

Eres una mujer increíble, fuerte, hermosa y llena de amor.

No existen palabras suficientes
para agradecer todo lo que haces por mí cada día ❤️

Gracias por enseñarme a seguir adelante,
por cuidarme incluso en tus días difíciles
y por darme siempre lo mejor de ti ✨

Tus palabras son mi fuerza,
tus abrazos mi lugar favorito
y tu amor el regalo más grande que tengo en la vida 💖

Deseo que hoy y siempre seas muy feliz,
porque te mereces todo lo bonito del mundo 🌹

Nunca olvides que eres la persona más importante de mi vida ❤️

Feliz Día de la Madre 💌
Te amo muchísimo Mamá❤️
Con muchísimo amor para ti 🌹❤️
`;

    // ABRIR SOBRE
    function mostrarSobre() {

      document.getElementById("overlay").classList.add("active");

      const sobre = document.getElementById("sobre");

      sobre.classList.add("active");

      const musica = document.getElementById("musica");

      musica.volume = 0.4;

      musica.play();

      setTimeout(() => {

        sobre.classList.add("abierto");

      }, 1000);

      setTimeout(() => {

        document.getElementById("carta").classList.add("active");

        document.getElementById("texto").innerHTML = mensaje;

      }, 2200);
    }

    // CERRAR
    function cerrarCarta() {

      document.getElementById("overlay").classList.remove("active");

      document.getElementById("carta").classList.remove("active");

      document.getElementById("sobre").classList.remove("active");

      document.getElementById("sobre").classList.remove("abierto");
    }

    // CORAZONES
    function crearCorazon() {

      const heart = document.createElement("div");

      heart.classList.add("heart");

      heart.innerHTML = "❤️";

      heart.style.left = Math.random() * 100 + "vw";

      heart.style.fontSize = Math.random() * 25 + 20 + "px";

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 6000);
    }

    setInterval(crearCorazon, 300);

    // ROSAS
    function crearPetalo() {

      const petalo = document.createElement("div");

      petalo.classList.add("petalo");

      petalo.innerHTML = "🌹";

      petalo.style.left = Math.random() * 100 + "vw";

      document.body.appendChild(petalo);

      setTimeout(() => {
        petalo.remove();
      }, 8000);
    }

    setInterval(crearPetalo, 900);

    // ESTRELLAS
    for (let i = 0; i < 80; i++) {

      const estrella = document.createElement("div");

      estrella.classList.add("estrella");

      estrella.style.left = Math.random() * 100 + "vw";

      estrella.style.top = Math.random() * 100 + "vh";

      estrella.style.animationDuration = Math.random() * 3 + 1 + "s";

      document.body.appendChild(estrella);
    }

  </script>

</body>

</html>
